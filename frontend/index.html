    <script>
      /* Browser autoplay policy starts every AudioContext suspended → no emulator
         sound until a user gesture. Track created contexts and resume them on the
         first real interaction (click / key / touch). Runs before the app/Nostalgist. */
      (function () {
        var ctxs = [];
        ["AudioContext", "webkitAudioContext"].forEach(function (n) {
          var Orig = window[n];
          if (!Orig) return;
          function Wrapped(opts) { var c = opts ? new Orig(opts) : new Orig(); ctxs.push(c); return c; }
          Wrapped.prototype = Orig.prototype;
          window[n] = Wrapped;
        });
        function unlock() {
          ctxs.forEach(function (c) {
            try {
              if (c.state === "suspended") c.resume();
              var s = c.createBufferSource();          // iOS needs a real buffer play to unlock
              s.buffer = c.createBuffer(1, 1, 22050);
              s.connect(c.destination); s.start(0);
            } catch (e) {}
          });
        }
        ["pointerdown", "touchend", "mousedown", "keydown", "click"].forEach(function (ev) {
          window.addEventListener(ev, unlock, true);
        });
      })();
    </script>

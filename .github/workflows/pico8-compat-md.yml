name: Refresh PICO-8 compatibility table

# Regenerates PICO8_COMPAT.md from the bundled compat sheet so the shareable
# Markdown list always matches backend/app/assets/pico8_compat.json. Runs once a
# day, on changes to the source/script, and on demand. Commits only when the
# generated file actually changes.
on:
  schedule:
    - cron: "17 6 * * *" # daily, 06:17 UTC
  push:
    branches: [main]
    paths:
      - "backend/app/assets/pico8_compat.json"
      - "scripts/gen_pico8_compat_md.py"
      - ".github/workflows/pico8-compat-md.yml"
  workflow_dispatch:

permissions:
  contents: write

# Don't overlap the daily run with a push-triggered one.
concurrency:
  group: pico8-compat-md
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate PICO8_COMPAT.md
        run: python scripts/gen_pico8_compat_md.py
      - name: Commit if changed
        run: |
          if git diff --quiet -- PICO8_COMPAT.md; then
            echo "No changes — PICO8_COMPAT.md is up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PICO8_COMPAT.md
          git commit -m "docs(pico8): refresh compatibility table"
          git push
